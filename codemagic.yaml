# Codemagic configuration for Expo React Native iOS Build
# Automatically generated by Antigravity AI

workflows:
  ios-release:
    name: MB Bank iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        # These variables can be overridden in Codemagic UI
        XCODE_PROJECT: "ios/MBBankApp.xcodeproj"
        XCODE_SCHEME: "MBBankApp"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Code signing
        script: |
          xcode-project use-profiles
      - name: Build and Sign IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/MBBankApp.xcworkspace \
            --scheme MBBankApp
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/build/Build/Products/Release-iphoneos/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - thaitienag09@gmail.com # Adjust as needed
        notify:
          success: true
          failure: true
