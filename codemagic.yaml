# Codemagic configuration for Expo React Native iOS Build
# Automatically generated by Antigravity AI

workflows:
  ios-release:
    name: MB Bank iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        # These variables can be overridden in Codemagic UI
        XCODE_PROJECT: "ios/MBBankApp.xcodeproj"
        XCODE_SCHEME: "MBBankApp"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build Unsigned IPA
        script: |
          # Build the .app bundle without signing
          xcodebuild \
            -workspace ios/MBBankApp.xcworkspace \
            -scheme MBBankApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            build
          
          # Create the Payload folder for the IPA
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/MBBankApp.app build/Payload/
          
          # Zip it up as MBBankApp_unsigned.ipa
          cd build
          zip -r MBBankApp_unsigned.ipa Payload
    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - thaitienag09@gmail.com # Adjust as needed
        notify:
          success: true
          failure: true
