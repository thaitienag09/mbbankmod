# Codemagic configuration for Expo React Native
# Generated by Antigravity AI

workflows:

  # ─────────────────────────────────────────
  # WORKFLOW 1: Quick Launch (iOS Simulator)
  # Dùng để preview nhanh trên Simulator
  # ─────────────────────────────────────────
  ios-simulator:
    name: MB Bank - Quick Launch (Simulator)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild (iOS)
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build for iOS Simulator
        script: |
          xcodebuild \
            -workspace ios/MBBankApp.xcworkspace \
            -scheme MBBankApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - build/Build/Products/Debug-iphonesimulator/MBBankApp.app
    publishing:
      email:
        recipients:
          - thaitienag09@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────
  # WORKFLOW 2: iOS Release (Build IPA)
  # Dùng để build file .ipa cài lên thiết bị
  # ─────────────────────────────────────────
  ios-release:
    name: MB Bank - iOS Release (IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "ios/MBBankApp.xcodeproj"
        XCODE_SCHEME: "MBBankApp"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild (iOS)
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build Unsigned IPA
        script: |
          # Build the .app bundle without signing
          xcodebuild \
            -workspace ios/MBBankApp.xcworkspace \
            -scheme MBBankApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            build

          # Create IPA from .app
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/MBBankApp.app build/Payload/
          cd build
          zip -r MBBankApp_unsigned.ipa Payload
    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - thaitienag09@gmail.com
        notify:
          success: true
          failure: true
